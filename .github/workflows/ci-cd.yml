name: CI/CD

permissions: { contents: read }

on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-24.04-arm

    services:
      postgres:
        # Should match the version in the `justfile` and `docker-compose.yml`
        image: postgres:18.4-alpine3.23
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: [5432:5432]

    steps:
      - &checkout
        uses: actions/checkout@v7
        with: { persist-credentials: false }

      - &nix-install
        name: Install Nix
        uses: nixbuild/nix-quick-install-action@v35

      - &nix-cache
        name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: >-
            nix-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ runner.arch }}-
          # Purge matching prefixes last accessed more than 7 days ago
          purge: true
          purge-prefixes: nix-${{ runner.os }}-${{ runner.arch }}-
          purge-last-accessed: P7D

      # Load the flake's devShell environment so rust-cache finds the correct rustc version
      - &nix-develop
        name: Load flake devShell
        uses: nicknovitski/nix-develop@v1

      - &rust-cache
        name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace --all-targets
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db
          SQLX_OFFLINE: true

  lint:
    runs-on: ubuntu-24.04-arm
    steps:
      - *checkout
      - *nix-install
      - *nix-cache
      - *nix-develop
      - *rust-cache
      - name: Run lints
        run: just lint

  fmt-check:
    runs-on: ubuntu-24.04-arm
    steps:
      - *checkout
      - *nix-install
      - *nix-cache
      - name: Check formatting
        run: nix develop --command just fmt-check

  spell-check:
    runs-on: ubuntu-24.04-arm
    steps:
      - *checkout
      - *nix-install
      - *nix-cache
      - name: Check spelling
        run: nix develop --command just spell-check

  # Always builds the Docker image (with caching), but only pushes it to GHCR if the workflow was
  # triggered by a push to main. Publishes both a commit hash tag and a latest tag.
  container-image:
    runs-on: ubuntu-24.04-arm
    permissions: { packages: write }
    needs: [test, lint, fmt-check, spell-check]

    steps:
      - uses: docker/setup-buildx-action@v3 # Necessary for caching in build-push-action

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          # Only push the image when pushing to main
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
